name: versori context rm
synopsis: Remove a configured context.
usage: versori context rm [flags]
options:
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for rm
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori context - Manages the authentications to the Versori platform
