name: versori systems
synopsis: Manage systems
options:
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for systems
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori - versori CLI
    - versori systems add-auth-scheme - Add or update an auth scheme config for a system
    - versori systems create - Create a new system in the current organisation
    - versori systems list - Lists systems for the current organisation context
