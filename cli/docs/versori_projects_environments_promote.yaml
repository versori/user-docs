name: versori projects environments promote
synopsis: |
    Promote one environment to another by syncing deployment configuration
description: "Promote one environment to another within a project.\nThis command copies the deployment configuration (currently the deployed docker image/version) \nfrom the source environment to the target environment.\n\nFor example, to promote staging to production:\n  versori projects environments promote --project <id> --source staging --target production"
usage: versori projects environments promote --project <project-id> --source <source-env> --target <target-env> [flags]
options:
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for promote
    - name: project
      usage: The ID of the project
    - name: source
      usage: The name of the source environment to promote from
    - name: target
      usage: The name of the target environment to promote to
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori projects environments - Manage project environments
