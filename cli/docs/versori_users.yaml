name: versori users
synopsis: Manage users
options:
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for users
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori - versori CLI
    - versori users create - Create a new user in the current organisation
    - versori users list - Lists users in the current organisation context
