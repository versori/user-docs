name: versori projects systems remove
synopsis: Remove a system (connection template) from a project
usage: versori projects systems remove --project <project-id> --template <connection-template-id> [flags]
options:
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for remove
    - name: project
      usage: The project ID from which to remove the system
    - name: template
      usage: The connection template ID to remove
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori projects systems - Manage systems within a project
