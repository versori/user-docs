name: versori systems create
synopsis: Create a new system in the current organisation
usage: versori systems create --name <name> --domain <domain> --template-base-url <url> [flags]
options:
    - name: domain
      usage: Domain of the system
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for create
    - name: name
      usage: Name of the system
    - name: template-base-url
      usage: Template base URL for the system
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori systems - Manage systems
