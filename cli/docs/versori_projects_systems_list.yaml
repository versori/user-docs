name: versori projects systems list
synopsis: List systems linked to a project
usage: versori projects systems list --project <project-id> --environment <environment-name> [flags]
options:
    - name: environment
      usage: The environment name within the project
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for list
    - name: project
      usage: The project ID to list systems for
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori projects systems - Manage systems within a project
