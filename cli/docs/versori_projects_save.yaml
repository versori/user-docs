name: versori projects save
synopsis: Save the project files to versori (no deploy)
usage: versori projects save [--project <project-id>] [--directory <directory>] [flags]
options:
    - name: assets
      default_value: "false"
      usage: Also upload assets from the versori-research directory
    - name: directory
      shorthand: d
      default_value: .
      usage: The directory containing the project files
    - name: dry-run
      default_value: "false"
      usage: Print files that would be uploaded without actually saving
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for save
    - name: project
      usage: |
        Project ID; defaults from .versori when inside a synced project directory.
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori projects - Manage the CLI context
