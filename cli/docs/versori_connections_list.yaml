name: versori connections list
synopsis: Lists connections for the current organisation context
usage: versori connections list [flags]
options:
    - name: end-user
      usage: Filter by end user ID
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for list
    - name: system
      usage: Filter by system ID
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori connections - Manage connections
