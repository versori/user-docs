name: versori projects systems delete-connection-template
synopsis: Delete a connection template from a project
usage: versori projects systems delete-connection-template --project <project-id> --template <template-id> [flags]
options:
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for delete-connection-template
    - name: project
      usage: The project ID containing the connection template
    - name: template
      usage: The connection template ID to delete
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori projects systems - Manage systems within a project
