name: versori projects versions pull
synopsis: Pull files from a version into the target directory
usage: versori projects versions pull [--directory <target-directory>] [--project <project-id>] [--version <version-id>] [--dry-run] [flags]
options:
    - name: directory
      shorthand: d
      default_value: .
      usage: Directory containing the versions to be uploaded
    - name: dry-run
      default_value: "false"
      usage: Print files that would be uploaded without actually pushing.
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for pull
    - name: project
      usage: ID of the project to push the version to.
    - name: version
      usage: |
        ID of the version. If not given, you will be prompted to select one.
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori projects versions - Manage versions within a project.
