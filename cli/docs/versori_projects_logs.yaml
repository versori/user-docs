name: versori projects logs
synopsis: Check the project logs
usage: versori projects logs  [flags]
options:
    - name: environment
      usage: |
        The environment to retrieve logs for. e.g. (production, staging)
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for logs
    - name: limit
      default_value: "0"
      usage: How many logs to retrieve; 0 means no explicit limit
    - name: project
      usage: |
        Project ID; defaults from .versori when inside a synced project directory.
    - name: search
      usage: Search query to filter logs
    - name: since
      default_value: 24h
      usage: 'Go duration since now, e.g. 24h, 2h30m (default: 24h)'
inherited_options:
    - name: config
      shorthand: c
      default_value: /Users/teodor/.versori/config.yaml
      usage: Config file (default is $HOME/.versori/config.yaml)
    - name: context
      shorthand: x
      usage: |
        Load a specific context. If not set will use the default active one.
    - name: output
      shorthand: o
      default_value: table
      usage: Output format (yaml, json, table)
see_also:
    - versori projects - Manage the CLI context
